trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

steps:
- task: NodeTool@0
  inputs:
    versionSpec: '18.x'

- script: |
    npm install
    node app.js &
    sleep 5
  displayName: 'Run App'

- task: Docker@2
  inputs:
    containerRegistry: '<your-docker-connection>'
    repository: 'cicd-demo'
    command: 'buildAndPush'
    Dockerfile: '**/Dockerfile'
    tags: 'latest'
